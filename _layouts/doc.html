<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #24292e; background: #fff; margin: 0; padding: 0; }
    .wrapper { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    nav { margin-bottom: 2rem; font-size: 0.9rem; }
    nav a { color: #0366d6; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 2rem; font-weight: 700; border-bottom: 1px solid #e1e4e8; padding-bottom: 0.4em; margin-top: 0; }
    h2 { font-size: 1.4rem; font-weight: 600; border-bottom: 1px solid #e1e4e8; padding-bottom: 0.3em; margin-top: 2rem; }
    h3 { font-size: 1.15rem; font-weight: 600; margin-top: 1.5rem; }
    h4 { font-size: 1rem; font-weight: 600; margin-top: 1.25rem; }
    pre { background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 6px; padding: 1rem; overflow-x: auto; font-size: 0.875rem; line-height: 1.5; }
    code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 0.875em; background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 3px; padding: 0.15em 0.4em; }
    pre code { background: none; border: none; padding: 0; font-size: inherit; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.9rem; }
    th { background: #f6f8fa; font-weight: 600; text-align: left; }
    th, td { border: 1px solid #e1e4e8; padding: 0.5rem 0.75rem; }
    tr:nth-child(even) td { background: #fafafa; }
    ol, ul { padding-left: 1.5rem; }
    li { margin: 0.25rem 0; }
    strong { font-weight: 600; }
    hr { border: none; border-top: 1px solid #e1e4e8; margin: 2rem 0; }
    p { margin: 0.8rem 0; }
    em { color: #6a737d; }
    a { color: #0366d6; }
    .theme-toggle {
      position: fixed; top: 1rem; right: 1rem;
      background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 6px;
      cursor: pointer; padding: 0.35rem 0.65rem; font-size: 1.1rem; z-index: 1000;
      color: #24292e; line-height: 1; transition: opacity 0.15s;
    }
    .theme-toggle:hover { opacity: 0.7; }

    /* Dark theme */
    html[data-theme="dark"] body { background: #0d1117; color: #c9d1d9; }
    html[data-theme="dark"] a,
    html[data-theme="dark"] nav a { color: #58a6ff; }
    html[data-theme="dark"] h1,
    html[data-theme="dark"] h2 { border-bottom-color: #30363d; }
    html[data-theme="dark"] pre { background: #161b22; border-color: #30363d; color: #c9d1d9; }
    html[data-theme="dark"] code { background: #161b22; border-color: #30363d; color: #c9d1d9; }
    html[data-theme="dark"] pre code { background: none; border: none; }
    html[data-theme="dark"] th { background: #161b22; }
    html[data-theme="dark"] th,
    html[data-theme="dark"] td { border-color: #30363d; }
    html[data-theme="dark"] tr:nth-child(even) td { background: #111419; }
    html[data-theme="dark"] hr { border-top-color: #30363d; }
    html[data-theme="dark"] em { color: #8b949e; }
    html[data-theme="dark"] .theme-toggle { background: #161b22; border-color: #30363d; color: #c9d1d9; }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
  <div class="wrapper">
    <nav><a href="{{ '/' | relative_url }}">← {{ site.title }}</a></nav>
    {{ content }}
  </div>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      function updateBtn() {
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        btn.textContent = dark ? '☀️' : '🌙';
        btn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
      }
      window.toggleTheme = function () {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateBtn();
      };
      updateBtn();
    })();
  </script>
</body>
</html>
