<h2 id="the-problem-with-scientific--industrial-software">The Problem with Scientific / Industrial Software</h2>
<div class="two-col">
<div>
<p><strong>Legacy desktop tooling</strong><br />
Thick-client installs per machine. Version conflicts. Manual workflows. No automation surface.</p>
<p><strong>No scalability model</strong><br />
Single-machine processing. No job queue. No parallel execution. Throughput limited to one operator at a time.</p>
<p><strong>Vendor and format lock-in</strong><br />
Proprietary closed formats. Processing pipelines tied to a single vendor binary. No standard I/O contracts.</p>
</div>
<div>
<p><strong>Poor visualization UX</strong><br />
Slow rendering speeds and low-quality output. No crispness, delayed visual updates, and poor legibility. Annotation requires external desktop tools.</p>
<p><strong>No integration surface</strong><br />
No REST API. No observability. No structured logging. Cannot fit into CI/CD or LIMS workflows without custom glue code.</p>
<div class="callout">
These are not niche complaints — they are the daily reality of teams using scientific desktop software built a decade ago.
</div>
</div>
</div>

<h2 id="architecture--four-decoupled-layers">Architecture — Four Decoupled Layers</h2>
<table>
<thead>
<tr>
<th>Layer</th>
<th>Components</th>
<th>Role</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Browser</strong></td>
<td>SeqView (vanilla JS) · XSeq (React + Vite) · webcomponents Canvas</td>
<td>Visualization — two independent frontends, one rendering library</td>
</tr>
<tr>
<td><strong>Service</strong></td>
<td>ASP.NET Core 9 · REST + SSE · file store · job queue · auth</td>
<td>Orchestration — deployment-mode agnostic</td>
</tr>
<tr>
<td><strong>Processors</strong></td>
<td>SangerBasecaller · ProcessStarter → BV / AIP</td>
<td>Basecalling — each job is an isolated OS process</td>
</tr>
<tr>
<td><strong>Data</strong></td>
<td>SequenceLogicData — AB1, SRD, DAN, SCF</td>
<td>File I/O — normalised to ACGT channel order in memory</td>
</tr>
</tbody>
</table>
<p><code>SequenceLogicData.dll</code> is loaded at runtime by ProcSvc and compiled into SangerBasecaller — one library, no duplication.</p>
<p><strong>Key properties:</strong> isolated process execution · normalized signal model · deployment-agnostic service · decoupled frontends via REST + SSE</p>
<p>The Browser layer also ships as an <strong>Electron desktop application</strong> — same frontend code, backend managed as a child process on <code>localhost</code>, no server required.</p>

<h2 id="high-performance-interactive-visualization">High-Performance Interactive Visualization</h2>
<div class="two-col">
<div>
<p><strong>Canvas-based renderer — <code>webcomponents</code></strong></p>
<ul>
<li>Zero DOM overhead — handles thousands of peaks without re-render jank</li>
<li>Smooth zoom and scroll, synchronized across channels</li>
<li>Multi-channel A/C/G/T display with configurable color coding</li>
<li>Vendor-calibrated quality scores (~Q0–24) color-coded over base calls</li>
<li>Position-aligned nucleotide text view — quality + IUPAC mutation color, drag-to-select, clipboard copy</li>
<li>IUPAC ambiguity codes at correct sub-pixel positions</li>
</ul>
<p><strong>Two frontend surfaces, one rendering core</strong></p>
<p><code>webcomponents</code> is a pure ES6 npm package; each frontend vendors a committed, obfuscated <code>dist/</code> build.</p>
</div>
<div class="panel">
<h4>Technical properties</h4>
<ul>
<li>Framework-agnostic library</li>
<li>Sub-sample annotation accuracy</li>
<li>Quality threshold highlighting configurable at runtime</li>
<li>Canvas snapshot export built-in</li>
<li>Zoom state persistent across navigation</li>
<li>Scroll synchronized across all channels</li>
</ul>
<h4>Frontends</h4>
<p><strong>SeqView</strong> — vanilla JS, minimal, zero framework dependencies</p>
<p><strong>XSeq</strong> — React + Vite, richer interactions, same Canvas core</p>
</div>

<h2 id="plugin-execution-architecture">Plugin Execution Architecture</h2>
<div class="two-col">
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>POST /process/{processorName}  →  202 + { jobId }
GET  /process/{jobId}/events   →  SSE stream
DELETE /process/{jobId}        →  cancel (propagated)

Events: started · progress · done · error
</code></pre>
<table>
<thead>
<tr>
<th>Processor</th>
<th>Invocation</th>
<th>Formats</th>
</tr>
</thead>
<tbody>
<tr>
<td>SangerBasecaller</td>
<td>Direct call</td>
<td>AB1, SRD, DAN, SCF</td>
</tr>
<tr>
<td>BV</td>
<td><code>ProcessStarter {file} bv</code></td>
<td>SRD</td>
</tr>
<tr>
<td>AIP</td>
<td><code>ProcessStarter {file} aip</code></td>
<td>SRD</td>
</tr>
<tr>
<td><strong>Any binary</strong></td>
<td>File path + JSON output</td>
<td>Configurable</td>
</tr>
</tbody>
</table>
</div>
<div class="panel">
<h4>Execution properties</h4>
<ul>
<li>One OS process per file — crash-isolated</li>
<li>No shared state between jobs</li>
<li>Cancellation propagated to child process</li>
<li>JSON contracts for all I/O</li>
</ul>
<h4>Scale model</h4>
<p>Single-node: in-process <code>Channel&lt;T&gt;</code></p>
<p>Distributed: Redis List (<code>RPUSH</code>/<code>LPOP</code>)</p>
<p>Workers: <code>docker compose --scale app=N</code></p>
<p>SSE fan-out: Redis Streams (any instance)</p>
</div>
</div>
</section>

<h2 id="desktop-deployment--no-server-required">Desktop Deployment — No Server Required</h2>
<div class="two-col">
<div>
<div class="deploy-stack">
<div class="deploy-box box-e"><strong>Electron Window</strong><small>Chromium · SeqView or XSeq · web UI unchanged</small></div>

<div class="deploy-box box-s"><strong>ProcSvc — ASP.NET Core 9</strong><small>self-contained binary · managed child process · single-node mode</small></div>
<div class="deploy-arrow">↓ one OS process per job</div>
<div class="deploy-box box-p"><strong>SangerBasecaller · ProcessStarter</strong><small>bundled in app directory alongside ProcSvc</small></div>
</div>
<div>// Electron main — startup
const svc = spawn('ProcSvc', ['--urls=http://localhost:5000'])
await waitForHealthy('http://localhost:5000/health')
win.loadURL('http://localhost:5000')
svc.on('exit', () =&gt; app.quit())</div>
</div>

<h2 id="extensibility--open-core-model">Extensibility &amp; Open-Core Model</h2>
<div class="two-col">
<div>
<p><strong>External processor integration</strong><br />
Any binary that accepts a file path and writes JSON output can be registered. No SDK required. No service rebuild.</p>
<p><strong>Format adapter pattern</strong><br />
<code>SequenceLogicData</code> is loaded at runtime as a DLL. New format support is a library update — not a service change.</p>
<p><strong>Frontend flexibility</strong><br />
<code>webcomponents</code> is a pure ES6 npm package — same Canvas renderer used by both vanilla JS and React frontends. Any web app can integrate it.</p>
<p><strong>AI/ML compatibility</strong><br />
Inference models can be wrapped as processor plugins without changes to orchestration or service layer.</p>
</div>
<div class="panel">
<h4>Open-core licensing</h4>
<p><strong>Open:</strong> core service · SeqView (vanilla JS) · file format I/O</p>
<p><strong>Commercial:</strong> native processor connectors · enterprise auth adapters · domain-specific integrations</p>
<h4>Why open-core?</h4>
<ul>
<li>Reduces vendor risk for enterprise evaluators</li>
<li>Security teams can audit what they deploy</li>
<li>Community builds format adapters</li>
<li>Commercial layer differentiates without closing the core</li>
</ul>
</div>
</div>
</section>

<h2 id="reference-implementation--sanger-basecalling">Reference Implementation — Sanger Basecalling</h2>
<p>Input: raw 4-channel fluorescence (A/C/G/T) from capillary electrophoresis</p>
<div class="three-col">
<div>
<p><strong>Signal conditioning</strong></p>
<ol>
<li>Spectral de-mixing — 4×4 cross-talk matrix</li>
<li>Background removal — first 500 samples</li>
<li>Bounds detection — 5σ dead-tail trim</li>
<li>Gaussian smoothing</li>
</ol>
</div>
<div>
<p><strong>Baseline &amp; alignment</strong><br />
5. Baseline subtraction — 5th-percentile sliding window + Gaussian<br />
6. Mobility correction — cross-correlation dye alignment<br />
7. Mexican hat filtering — peak sharpening</p>
</div>
<div>
<p><strong>Detection &amp; scoring</strong><br />
8. Peak detection — 8-stage: candidates → width gate → dominance → noise suppressor → dedup → IUPAC merge → gap fill<br />
9. Quality scoring — Q0–Q60 raw, vendor-calibrated to ~Q0–24</p>
</div>
</div>
<p><strong>Quality model:</strong> <code>Q = Recalibrate(min(Q_snr, Q_pred))</code> — signal purity × spacing regularity against a local running-median model (±25 peaks), remapped via isotonic regression against vendor (Mutation Surveyor) ground truth — practical ceiling ~Q24, not 60</p>
<p><strong>Supported formats:</strong> <span class="chip">AB1</span> <span class="chip">SRD</span> <span class="chip">DAN v2–6</span> <span class="chip">SCF v3</span></p>
</section>

<h2 id="platform-applications">Platform Applications</h2>
<div class="two-col">
<div>
<p><strong>SequenceHub today:</strong> Sanger DNA sequencing analysis — architecture is domain-agnostic.</p>
<p><strong>Analytical instrumentation</strong><br />
Multi-channel time-series from chromatography, spectroscopy, or any fluorescence instrument → browser-native visualization with quality overlays.</p>
<p><strong>Industrial telemetry</strong><br />
Signal quality scoring, anomaly overlays, and interactive trace browsing apply directly to sensor data from manufacturing equipment.</p>
<p><strong>Scientific visualization SaaS</strong><br />
Complete foundation: web service, Canvas renderer, multi-user file management, auth, job queue.</p>
</div>
<div>
<p><strong>Regulatory &amp; compliance domains</strong><br />
Auth, structured audit logging, <code>CorrelationId</code> tracking, and immutable file storage are already in place — no retrofit needed.</p>
<div class="callout">
<strong>Open-core strategy</strong><br />
Core platform (service + visualization + file I/O) is open-source. Domain connectors, native instrument integrations, and enterprise auth adapters are the commercial layer.
<br /><br />
Reduces vendor risk. Community builds adapters. Customers audit what they deploy.
</div>
