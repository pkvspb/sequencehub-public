<h2 id="%D0%BF%D1%80%D0%BE%D0%B1%D0%BB%D0%B5%D0%BC%D1%8B-%D0%BD%D0%B0%D1%83%D1%87%D0%BD%D0%BE%D0%B3%D0%BE--%D0%BF%D1%80%D0%BE%D0%BC%D1%8B%D1%88%D0%BB%D0%B5%D0%BD%D0%BD%D0%BE%D0%B3%D0%BE-%D0%BF%D0%BE">Проблемы научного / промышленного ПО</h2>
<div class="two-col">
<div>
<p><strong>Устаревший настольный инструментарий</strong><br />
Установка на каждую машину. Конфликты версий. Ручные рабочие процессы. Нет интерфейса для автоматизации.</p>
<p><strong>Отсутствие масштабируемости</strong><br />
Обработка на одной машине. Нет очереди заданий. Нет параллельного выполнения. Пропускная способность ограничена одним оператором.</p>
<p><strong>Зависимость от вендора и формата</strong><br />
Проприетарные закрытые форматы. Конвейеры обработки привязаны к бинарному файлу одного вендора. Нет стандартных контрактов ввода/вывода.</p>
</div>
<div>
<p><strong>Неудобная визуализация</strong><br />
Низкая скорость рендеринга и некачественный вывод. Нет чёткости, задержки обновления, плохая читаемость. Для аннотаций требуются внешние инструменты.</p>
<p><strong>Нет поверхности интеграции</strong><br />
Нет REST API. Нет наблюдаемости. Нет структурированного логирования. Нельзя встроить в CI/CD или LIMS без написания специального связующего кода.</p>
<div class="callout">
Это не нишевые жалобы — это повседневная реальность команд, использующих научное настольное ПО, разработанное десять лет назад.
</div>
</div>
</div>

<h2 id="%D0%B0%D1%80%D1%85%D0%B8%D1%82%D0%B5%D0%BA%D1%82%D1%83%D1%80%D0%B0--%D1%87%D0%B5%D1%82%D1%8B%D1%80%D0%B5-%D0%BD%D0%B5%D0%B7%D0%B0%D0%B2%D0%B8%D1%81%D0%B8%D0%BC%D1%8B%D1%85-%D1%81%D0%BB%D0%BE%D1%8F">Архитектура — четыре независимых слоя</h2>
<table>
<thead>
<tr>
<th>Слой</th>
<th>Компоненты</th>
<th>Назначение</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Браузер</strong></td>
<td>SeqView (vanilla JS) · XSeq (React + Vite) · webcomponents Canvas</td>
<td>Визуализация — два независимых фронтенда, одна библиотека рендеринга</td>
</tr>
<tr>
<td><strong>Сервис</strong></td>
<td>ASP.NET Core 9 · REST + SSE · файловое хранилище · очередь заданий · auth</td>
<td>Оркестрация — не зависит от режима развёртывания</td>
</tr>
<tr>
<td><strong>Процессоры</strong></td>
<td>SangerBasecaller · ProcessStarter → BV / AIP</td>
<td>Basecalling — каждое задание выполняется в изолированном процессе ОС</td>
</tr>
<tr>
<td><strong>Данные</strong></td>
<td>SequenceLogicData — AB1, SRD, DAN, SCF</td>
<td>Файловый I/O — нормализация к порядку каналов ACGT в памяти</td>
</tr>
</tbody>
</table>
<p><code>SequenceLogicData.dll</code> загружается ProcSvc во время выполнения и компилируется в SangerBasecaller — одна библиотека без дублирования.</p>
<p><strong>Ключевые свойства:</strong> изолированное выполнение процессов · нормализованная модель сигнала · сервис без привязки к режиму развёртывания · независимые фронтенды через REST + SSE</p>
<p>Слой браузера также поставляется как настольное приложение на Electron — тот же код фронтенда, бэкенд управляется как дочерний процесс на <code>localhost</code>, сервер не требуется.</p>
</section>

<h2 id="%D0%B2%D1%8B%D1%81%D0%BE%D0%BA%D0%BE%D0%BF%D1%80%D0%BE%D0%B8%D0%B7%D0%B2%D0%BE%D0%B4%D0%B8%D1%82%D0%B5%D0%BB%D1%8C%D0%BD%D0%B0%D1%8F-%D0%B8%D0%BD%D1%82%D0%B5%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D0%B2%D0%BD%D0%B0%D1%8F-%D0%B2%D0%B8%D0%B7%D1%83%D0%B0%D0%BB%D0%B8%D0%B7%D0%B0%D1%86%D0%B8%D1%8F">Высокопроизводительная интерактивная визуализация</h2>
<div class="two-col">
<div>
<p><strong>Рендерер на Canvas — <code>webcomponents</code></strong></p>
<ul>
<li>Нулевые накладные расходы DOM — обрабатывает тысячи пиков без задержек рендеринга</li>
<li>Плавное масштабирование и прокрутка, синхронизированные по каналам</li>
<li>Многоканальное отображение A/C/G/T с настраиваемой цветовой кодировкой</li>
<li>Оценки качества Q0–Q60, нанесённые цветом поверх вызовов оснований</li>
<li>Коды неоднозначности IUPAC на точных субпиксельных позициях</li>
</ul>
<p><strong>Два фронтенда, одно ядро рендеринга</strong></p>
<p><code>webcomponents</code> — чистый ES6 npm-пакет, импортируемый обоими фронтендами через <code>npm link</code>.</p>
</div>
<div class="panel">
<h4>Технические свойства</h4>
<ul>
<li>Библиотека без привязки к фреймворку</li>
<li>Точность аннотации на субвыборочном уровне</li>
<li>Порог подсветки качества настраивается во время выполнения</li>
<li>Состояние масштабирования сохраняется при навигации</li>
<li>Прокрутка синхронизирована по всем каналам</li>
</ul>

<p><strong>SeqView</strong> — vanilla JS, минимальный, без зависимостей от фреймворков</p>
<p><strong>XSeq</strong> — React + Vite, расширенные взаимодействия, то же ядро Canvas</p>
</div>
</div>

<h2 id="%D0%B0%D1%80%D1%85%D0%B8%D1%82%D0%B5%D0%BA%D1%82%D1%83%D1%80%D0%B0-%D0%BF%D0%BE%D0%B4%D0%BA%D0%BB%D1%8E%D1%87%D0%B0%D0%B5%D0%BC%D1%8B%D1%85-%D0%BF%D1%80%D0%BE%D1%86%D0%B5%D1%81%D1%81%D0%BE%D1%80%D0%BE%D0%B2">Архитектура подключаемых процессоров</h2>
<div class="two-col">
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>POST /process/{processorName}  →  202 + { jobId }
GET  /process/{jobId}/events   →  SSE stream
DELETE /process/{jobId}        →  cancel (propagated)

Events: started · progress · done · error
</code></pre>
<table>
<thead>
<tr>
<th>Процессор</th>
<th>Вызов</th>
<th>Форматы</th>
</tr>
</thead>
<tbody>
<tr>
<td>SangerBasecaller</td>
<td>Прямой вызов</td>
<td>AB1, SRD, DAN, SCF</td>
</tr>
<tr>
<td>BV</td>
<td><code>ProcessStarter {file} bv</code></td>
<td>SRD</td>
</tr>
<tr>
<td>AIP</td>
<td><code>ProcessStarter {file} aip</code></td>
<td>SRD</td>
</tr>
<tr>
<td><strong>Любой бинарный файл</strong></td>
<td>Путь к файлу + JSON-вывод</td>
<td>Настраивается</td>
</tr>
</tbody>
</table>
</div>
<div class="panel">
<h4>Свойства выполнения</h4>
<ul>
<li>Один процесс ОС на файл — изоляция от сбоев</li>
<li>Нет общего состояния между заданиями</li>
<li>Отмена передаётся дочернему процессу</li>
<li>JSON-контракты для всего ввода/вывода</li>
</ul>
<h4 style="margin-top:0.8em;">Модель масштабирования</h4>
<p>Один узел: внутрипроцессный <code>Channel&lt;T&gt;</code></p>

<p><strong>Кастомные метрики Prometheus:</strong></p>
<ul>

</ul>
</div>
<div>
<p><strong>Структурированное логирование и трассировка:</strong></p>
<ul>
<li>JSON-логи → Loki через OTel Collector</li>
<li><code>CorrelationId</code> передаётся с каждым запросом</li>
<li>OpenTelemetry spans для каждой сессии обработки</li>

</ul>

<div class="deploy-arrow">↓ один процесс ОС на задание</div>

</div>
<div style="font-family:'Cascadia Code',Consolas,monospace;font-size:0.5em;background:#1e2430;color:#c9d1d9;padding:9px 13px;border-radius:6px;white-space:pre;line-height:1.6;">// Electron main — startup

await waitForHealthy('http://localhost:5000/health')
win.loadURL('http://localhost:5000')
svc.on('exit', () =&gt; app.quit())</div>

<h2 id="%D1%80%D0%B0%D1%81%D1%88%D0%B8%D1%80%D1%8F%D0%B5%D0%BC%D0%BE%D1%81%D1%82%D1%8C-%D0%B8-%D0%BE%D1%82%D0%BA%D1%80%D1%8B%D1%82%D0%BE%D0%B5-%D1%8F%D0%B4%D1%80%D0%BE">Расширяемость и открытое ядро</h2>
<div class="two-col">
<div>
<p><strong>Интеграция внешних процессоров</strong><br />
Любой бинарный файл, принимающий путь к файлу и записывающий JSON, может быть зарегистрирован. SDK не нужен. Сервис не требует пересборки.</p>
<p><strong>Шаблон адаптера формата</strong><br />
<code>SequenceLogicData</code> загружается как DLL во время выполнения. Поддержка нового формата — это обновление библиотеки, а не изменение сервиса.</p>
<p><strong>Гибкость фронтенда</strong><br />
<code>webcomponents</code> — чистый ES6 npm-пакет. Один Canvas-рендерер используется обоими фронтендами. Любое веб-приложение может его интегрировать.</p>
<p><strong>Совместимость с AI/ML</strong><br />
Модели инференса могут быть обёрнуты как процессорные плагины без изменений в оркестрации или сервисном слое.</p>
</div>
<div class="panel">
<h4>Стратегия лицензирования</h4>
<p><strong>Открытое ядро (целевая модель):</strong> основной сервис · SeqView (vanilla JS) · файловый I/O</p>
<p><strong>Коммерческий слой:</strong> нативные коннекторы процессоров · корпоративные адаптеры auth · отраслевые интеграции</p>
<h4 style="margin-top:0.8em;">Почему открытое ядро?</h4>
<ul>
<li>Снижает риски привязки к вендору для корпоративных покупателей</li>
<li>Команды безопасности могут аудировать то, что развёртывают</li>
<li>Сообщество создаёт адаптеры форматов</li>
<li>Коммерческий слой выделяется без закрытия ядра</li>
</ul>
</div>
</div>

<h2 id="%D1%80%D0%B5%D1%84%D0%B5%D1%80%D0%B5%D0%BD%D1%81%D0%BD%D0%B0%D1%8F-%D1%80%D0%B5%D0%B0%D0%BB%D0%B8%D0%B7%D0%B0%D1%86%D0%B8%D1%8F--sanger-basecalling">Референсная реализация — Sanger Basecalling</h2>
<p>Ввод: сырая 4-канальная флуоресценция (A/C/G/T) из капиллярного электрофореза</p>
<div class="three-col">
<div>
<p><strong>Кондиционирование сигнала</strong></p>
<ol>
<li>Спектральное разделение — матрица перекрёстных помех 4×4</li>
<li>Удаление фона — первые 500 отсчётов</li>
<li>Определение границ — обрезка мёртвого хвоста 5σ</li>
<li>Gaussian smoothing</li>
</ol>
</div>
<div>
<p><strong>Базовая линия и выравнивание</strong><br />
5. Вычитание базовой линии — скользящее окно 5-го перцентиля + Gaussian<br />
6. Коррекция подвижности — выравнивание красителей кросс-корреляцией<br />
7. Mexican hat filtering — заострение пиков</p>
</div>
<div>
<p><strong>Обнаружение и оценка</strong><br />
8. Обнаружение пиков — 8 этапов: кандидаты → ворота ширины → доминантность → подавление шума → дедупликация → слияние IUPAC → заполнение пробелов<br />
9. Оценка качества — Q0–Q60 по шкале Phred</p>
</div>
</div>
<p><strong>Модель качества:</strong> <code>Q = min(Q_snr, Q_pred)</code> — чистота сигнала × регулярность интервалов по локальной скользящей медиане (±25 пиков)</p>
<p><strong>Поддерживаемые форматы:</strong> <span class="chip">AB1</span> <span class="chip">SRD</span> <span class="chip">DAN v2–6</span> <span class="chip">SCF v3</span></p>
